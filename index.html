<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Ulang Tahun 🎮</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: pink;
}.hidden { display: none; }

button { padding: 10px 20px; margin: 10px; border-radius: 10px; border: none; background: hotpink; color: white; cursor: pointer; }

.gift { font-size: 60px; cursor: pointer; margin: 10px; }

#lives { font-size: 20px; margin-bottom: 10px; } </style>

</head><body><div id="start">
  <h1>🎮 Mini Game 🎮</h1>
  <p>Bantu Abil cari kado buat Aura 😏</p>
  <button onclick="startGame()">Mulai</button>
</div><div id="game" class="hidden">
  <h2>Pilih kado yang benar 🎁</h2>
  <div id="lives">❤️❤️❤️</div>  <div>
    <span class="gift" onclick="wrong()">🎁</span>
    <span class="gift" onclick="wrong()">🎁</span>
    <span class="gift" onclick="correct()">🎁</span>
  </div>
</div><div id="win" class="hidden">
  <h1 id="hb"></h1>
  <p id="msg"></p>
</div><div id="lose" class="hidden">
  <h1>💀 Kamu kalah!</h1>
  <p>Kasian... nyawanya habis 😜</p>
  <button onclick="restart()">Coba Lagi</button>
</div><!-- MUSIK MENANG --><audio id="music">
  <source src="music.mp3" type="audio/mpeg">
</audio><!-- SOUND YIPPEE --><audio id="yippee">
  <source src="yippee-tbh.mp3" type="audio/mpeg">
</audio><script>
let lives = 3;

function startGame() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
}

function updateLives() {
  let display = "❤️".repeat(lives);
  document.getElementById("lives").innerText = display;
}

function wrong() {
  lives--;
  updateLives();

  if (lives <= 0) {
    document.getElementById("game").classList.add("hidden");
    document.getElementById("lose").classList.remove("hidden");
  } else {
    alert("Salah 😜 Nyawa kamu berkurang!");
  }
}

function correct() {
  // sound yippee
  let yip = document.getElementById("yippee");
  yip.currentTime = 0;
  yip.play().catch(()=>{});

  // musik menang
  let music = document.getElementById("music");
  music.play().catch(()=>{});

  document.getElementById("game").classList.add("hidden");
  document.getElementById("win").classList.remove("hidden");

  animateText("🎉 Happy Birthday Aura 🎉", "hb");
  setTimeout(() => {
    animateText("Yeyy 15 tahun 😆✨ Dari Abil 😎", "msg");
  }, 2000);
}

function restart() {
  lives = 3;
  updateLives();

  document.getElementById("lose").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
}

function animateText(text, id) {
  let el = document.getElementById(id);
  el.innerHTML = "";

  text.split("").forEach((char, i) => {
    setTimeout(() => {
      el.innerHTML += char;
    }, i * 50);
  });
}
</script></body>
</html>
