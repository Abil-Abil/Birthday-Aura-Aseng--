<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Ulang Tahun 🎮</title>
<style>
body { font-family: Arial; text-align: center; background: pink; }
.hidden { display: none; }h1 { font-size: 40px; } h2 { font-size: 30px; } p { font-size: 20px; }

button { padding: 12px 25px; margin: 10px; border-radius: 10px; border: none; background: hotpink; color: white; font-size: 18px; cursor: pointer; }

.gift { font-size: 80px; cursor: pointer; margin: 15px; }

#lives { font-size: 25px; } #timer { font-size: 25px; color: red; }

/* shake effect */ .shake { animation: shake 0.5s; }

@keyframes shake { 0% { transform: translate(0px, 0px); } 25% { transform: translate(5px, -5px); } 50% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, 5px); } 100% { transform: translate(0px, 0px); } } </style>

</head><body><div id="start">
  <h1>🎮 Mini Game 🎮</h1>
  <p>Bantu Abil cari kado buat Aura 😏</p>
  <button onclick="startGame()">Mulai</button>
</div><div id="game" class="hidden">
  <h2 id="levelText">Level 1</h2>
  <h2>Pilih kado, jangan sampai salah ya 😏🎁</h2>
  <div id="lives">❤️❤️❤️</div>
  <div id="timer">⏳ 10</div>  <div id="giftContainer"></div>
</div><div id="win" class="hidden">
  <h1 id="hb"></h1>
  <p id="msg"></p>
</div><div id="lose" class="hidden">
  <h1>💀 Kamu kalah!</h1>
  <p>Yahh gagal 😜 ulang lagi!</p>
  <button onclick="restart()">Coba Lagi</button>
</div><audio id="music"><source src="music.mp3"></audio> <audio id="yippee"><source src="yippee-tbh.mp3"></audio>

<script>
let lives = 3;
let level = 1;
let correctIndex = 0;
let timer = 10;
let interval;

function startGame() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  startLevel();
}

function startLevel() {
  document.getElementById("levelText").innerText = "Level " + level;
  setupGifts();
  startTimer();
}

function setupGifts() {
  let container = document.getElementById("giftContainer");
  container.innerHTML = "";

  let total = level === 1 ? 4 : (level === 2 ? 6 : 8);
  correctIndex = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {
    let span = document.createElement("span");
    span.className = "gift";
    span.innerHTML = "🎁";

    span.onclick = (i === correctIndex) ? correct : wrong;

    container.appendChild(span);
  }
}

function startTimer() {
  clearInterval(interval);
  timer = level === 1 ? 10 : (level === 2 ? 7 : 5);
  document.getElementById("timer").innerText = "⏳ " + timer;

  interval = setInterval(() => {
    timer--;
    document.getElementById("timer").innerText = "⏳ " + timer;

    if (timer <= 0) {
      clearInterval(interval);
      lose();
    }
  }, 1000);
}

function updateLives() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
}

function wrong() {
  lives--;
  updateLives();

  if (lives <= 0) {
    lose();
  } else {
    alert("Salah 😜 cepat pilih lagi!");
  }
}

function correct() {
  clearInterval(interval);

  if (level === 1) {
    level = 2;
    alert("Mantap! Level 2 😈");
    startLevel();
    return;
  }

  if (level === 2) {
    level = 3;
    alert("Gila 😳 masuk Level 3!");
    startLevel();
    return;
  }

  let yip = document.getElementById("yippee");
  yip.play().catch(()=>{});

  let music = document.getElementById("music");
  music.play().catch(()=>{});

  document.getElementById("game").classList.add("hidden");
  document.getElementById("win").classList.remove("hidden");

  animateText("🎉 Happy Birthday Aura 🎉", "hb");

  setTimeout(() => {
    animateText(`Yeyy Aura sekarang 15 tahun 😆✨\n\nSemoga makin cantik, makin lucu, makin rajin 😤 dan makin bahagia 💕\n\nJangan sering ngambek ya 😜 tapi tetep lucu sih 🧸🌸\n\nSemoga semua impian kamu tercapai 🎯✨\n\nDari: Abil 😎`, "msg");
  }, 2000);
}

function lose() {
  clearInterval(interval);

  // shake effect
  document.body.classList.add("shake");
  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 500);

  document.getElementById("game").classList.add("hidden");
  document.getElementById("lose").classList.remove("hidden");
}

function restart() {
  lives = 3;
  level = 1;
  updateLives();

  document.getElementById("lose").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  startLevel();
}

function animateText(text, id) {
  let el = document.getElementById(id);
  el.innerHTML = "";

  text.split("").forEach((char, i) => {
    setTimeout(() => {
      el.innerHTML += char;
    }, i * 40);
  });
}
</script></body>
</html>
