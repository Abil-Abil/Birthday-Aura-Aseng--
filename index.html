<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Ulang Tahun 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: pink;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

h1 { font-size: 60px; }
h2 { font-size: 40px; }
p { font-size: 28px; }

button {
  padding: 15px 30px;
  margin: 10px;
  border-radius: 15px;
  border: none;
  background: hotpink;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

.gift {
  font-size: 100px;
  cursor: pointer;
  margin: 15px;
}

#lives { font-size: 30px; }
#timer { font-size: 30px; color: red; }

.hidden { display: none; }

.shake {
  animation: shake 0.5s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(10px,-10px); }
  50% { transform: translate(-10px,10px); }
  75% { transform: translate(10px,10px); }
  100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<div id="start">
  <h1>🎮 Mini Game 🎮</h1>
  <p>Bantu Abil cari kado buat Aura 😏</p>
  <button onclick="startGame()">Mulai</button>
</div>

<div id="game" class="hidden">
  <h2 id="levelText">Level 1</h2>
  <p>Pilih kado, jangan sampai salah ya 😏🎁</p>
  <div id="lives">❤️❤️❤️</div>
  <div id="timer">⏳ 10</div>
  <div id="giftContainer"></div>
</div>

<div id="win" class="hidden">
  <h1 id="hb"></h1>
  <p id="msg"></p>
</div>

<div id="lose" class="hidden">
  <h1>💀 Kamu kalah!</h1>
  <p>Yahh gagal 😜 ulang lagi!</p>
  <button onclick="restart()">Coba Lagi</button>
</div>

<!-- AUDIO -->
<audio id="music">
  <source src="music.mp3">
</audio>

<audio id="yippee">
  <source src="yippee-tbh.mp3">
</audio>

<script>
let lives = 3;
let level = 1;
let correctIndex = 0;
let timer = 10;
let interval;

function startGame() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  startLevel();
}

function startLevel() {
  document.getElementById("levelText").innerText = "Level " + level;
  setupGifts();
  startTimer();
}

function setupGifts() {
  let container = document.getElementById("giftContainer");
  container.innerHTML = "";

  let total = level === 1 ? 4 : 6;
  correctIndex = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {
    let span = document.createElement("span");
    span.className = "gift";
    span.innerHTML = "🎁";

    span.onclick = (i === correctIndex) ? correct : wrong;
    container.appendChild(span);
  }
}

function startTimer() {
  clearInterval(interval);
  timer = level === 1 ? 10 : 7;
  document.getElementById("timer").innerText = "⏳ " + timer;

  interval = setInterval(() => {
    timer--;
    document.getElementById("timer").innerText = "⏳ " + timer;

    if (timer <= 0) {
      clearInterval(interval);
      lose();
    }
  }, 1000);
}

function updateLives() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
}

function wrong() {
  lives--;
  updateLives();

  if (lives <= 0) {
    lose();
  } else {
    alert("Salah 😜 cepat pilih lagi!");
  }
}

function correct() {
  clearInterval(interval);

  if (level === 1) {
    level = 2;
    alert("Mantap! Level 2 😈");
    startLevel();
    return;
  }

  document.getElementById("yippee").play().catch(()=>{});
  document.getElementById("music").play().catch(()=>{});

  document.getElementById("game").classList.add("hidden");
  document.getElementById("win").classList.remove("hidden");

  animateText("🎉 Happy Birthday Aura 🎉", "hb");

  setTimeout(() => {
    animateText(`Yeyy Aura sekarang 15 tahun 😆✨

Semoga makin cantik, makin lucu, makin rajin 😤 dan makin bahagia 💕

Jangan sering ngambek ya 😜 tapi tetep lucu sih 🧸🌸

Semoga semua impian kamu tercapai 🎯✨

Dari: Abil 😎`, "msg");
  }, 2000);
}

function lose() {
  clearInterval(interval);

  document.body.classList.add("shake");
  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 500);

  document.getElementById("game").classList.add("hidden");
  document.getElementById("lose").classList.remove("hidden");
}

function restart() {
  lives = 3;
  level = 1;
  updateLives();

  document.getElementById("lose").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  startLevel();
}

function animateText(text, id) {
  let el = document.getElementById(id);
  el.innerHTML = "";

  text.split("").forEach((char, i) => {
    setTimeout(() => {
      el.innerHTML += char;
    }, i * 40);
  });
}
</script>

</body>
</html>
